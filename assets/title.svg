<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <title id="title">Terminal Header</title>
  <defs>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <clipPath id="clipHandle">
      <rect x="145" y="103" width="0" height="54">
        <animate attributeName="width" dur="8s" repeatCount="indefinite"
          values="0;230;230;0;0;0"
          keyTimes="0;0.20;0.36;0.50;0.99;1" />
      </rect>
    </clipPath>

    <clipPath id="clipName">
      <rect x="145" y="103" width="0" height="54">
        <animate attributeName="width" dur="8s" repeatCount="indefinite"
          values="0;0;0;310;310;0;0"
          keyTimes="0;0.50;0.54;0.72;0.86;0.98;1" />
      </rect>
    </clipPath>
  </defs>

  <style>
    .bg { fill: #020604; }
    .frame { fill: none; stroke: #164b2a; stroke-width: 2; }
    .scanline { stroke: rgba(76, 255, 123, 0.06); stroke-width: 1; }
    .prompt { font: 600 26px 'JetBrains Mono', 'Fira Code', Consolas, monospace; fill: #4cff7b; }
    .typed { font: 700 42px 'JetBrains Mono', 'Fira Code', Consolas, monospace; fill: #9dffb4; filter: url(#softGlow); }
    .dim { fill: #267d44; }
    .cursor { fill: #9dffb4; filter: url(#softGlow); animation: blink 0.75s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>

  <rect class="bg" x="0" y="0" width="900" height="220" rx="22" />
  <rect class="frame" x="24" y="24" width="852" height="172" rx="16" />
  <line class="scanline" x1="32" y1="58" x2="868" y2="58" />
  <line class="scanline" x1="32" y1="96" x2="868" y2="96" />
  <line class="scanline" x1="32" y1="134" x2="868" y2="134" />
  <line class="scanline" x1="32" y1="172" x2="868" y2="172" />

  <circle cx="55" cy="48" r="6" fill="#1f6f3a" />
  <circle cx="78" cy="48" r="6" fill="#2c9d52" />
  <circle cx="101" cy="48" r="6" fill="#4cff7b" />

  <text x="76" y="87" class="prompt"><tspan class="dim">sahil@github</tspan>:~$ whoami</text>
  <text x="145" y="145" class="typed" clip-path="url(#clipHandle)">aunncodes</text>
  <text x="145" y="145" class="typed" clip-path="url(#clipName)">Sahil Chopra</text>

  <rect class="cursor" x="145" y="108" width="18" height="45">
    <animate attributeName="x" dur="8s" repeatCount="indefinite"
      values="145;375;375;145;145;455;455;145;145"
      keyTimes="0;0.20;0.36;0.50;0.54;0.72;0.86;0.98;1" />
  </rect>
</svg>
