name: Update README SVG assets

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-svg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r scripts/requirements.txt

      - name: Inline assets
        run: python scripts/inline_assets.py

      - name: Commit updated README SVG
        run: |
          if git diff --quiet -- assets/readme.svg; then
            echo "Same SVG"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/readme.svg
          git commit -m "Update README SVG assets"
          git push