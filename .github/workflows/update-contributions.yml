name: Update contribution image

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-contributions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r scripts/requirements.txt

      - name: Generate contribution image
        run: python scripts/contributions.py

      - name: Commit updated image
        run: |
          if git diff --quiet -- assets/contributions.png; then
            echo "Same image"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/contributions.png
          git commit -m "Update contribution image"
          git push